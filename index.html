<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Dink Syndicate — offline-first pickleball queue manager">

  <meta name="theme-color" content="#1E293B">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dink Syndicate">

  <title>Dink Syndicate</title>
  <meta name="app-version" content="0.3.3">

  <script>
    (function () {
      try {
        var t = localStorage.getItem('dinksyndicate_theme');
        if (t === 'default') document.documentElement.dataset.theme = 'default';
      } catch (e) { /* ignore */ }
    })();
  </script>

  <script src="/version-check-head.js"></script>

  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app" aria-live="polite"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
